syntax = "proto3";

package payment.v1.service;

import "payment/v1/base/payment.proto";

option go_package = "github.com/zhettick/order-payment-gen/payment/v1/service;service";

service PaymentService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc GetByID(GetByIDRequest) returns (GetByIDResponse);
  rpc ListPayments(ListPaymentsRequest) returns (ListPaymentsResponse);
}

message CreateRequest {
  string order_id = 1;
  int64 amount = 2;
}

message CreateResponse {
  payment.v1.base.Payment payment = 1;
}

message GetByIDRequest {
  string order_id = 1;
}

message GetByIDResponse {
  payment.v1.base.Payment payment = 1;
}

message ListPaymentsRequest {
  int64 min_amount = 1;
  int64 max_amount = 2;
}

message ListPaymentsResponse {
  repeated payment.v1.base.Payment payments = 1;
}